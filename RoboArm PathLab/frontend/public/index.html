<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="工业机械臂路径规划平台 - RoboArm PathLab"
    />
    <title>RoboArm PathLab - 工业机械臂路径规划平台</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #0a0a0f;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      
      @keyframes warning {
        0%, 100% { box-shadow: 0 0 10px rgba(255, 0, 0, 0.5); }
        50% { box-shadow: 0 0 30px rgba(255, 0, 0, 0.9); }
      }
      
      @keyframes success {
        0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 100, 0.5); }
        50% { box-shadow: 0 0 30px rgba(0, 255, 100, 0.9); }
      }
      
      .animate-pulse {
        animation: pulse 1.5s infinite;
      }
      
      .animate-warning {
        animation: warning 0.5s infinite;
      }
      
      .animate-success {
        animation: success 0.8s infinite;
      }
    </style>
  </head>
  <body>
    <noscript>您需要启用 JavaScript 来运行此应用程序。</noscript>
    <div id="root"></div>
  </body>
</html>
