<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沙河生存 - 无限开放世界沙盒生存游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      overflow: hidden;
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: #000;
    }
    
    #game-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      pointer-events: none;
      z-index: 1000;
    }
    
    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.7);
    }
    
    #crosshair::before {
      width: 2px;
      height: 20px;
      left: 9px;
      top: 0;
    }
    
    #crosshair::after {
      width: 20px;
      height: 2px;
      left: 0;
      top: 9px;
    }
    
    #ui-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }
    
    #hotbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      padding: 4px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 4px;
      pointer-events: auto;
    }
    
    .hotbar-slot {
      width: 50px;
      height: 50px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      background: rgba(139, 139, 139, 0.3);
      position: relative;
      cursor: pointer;
      transition: border-color 0.1s;
    }
    
    .hotbar-slot.selected {
      border-color: #ffcc00;
      box-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
    }
    
    .hotbar-slot:hover {
      border-color: rgba(255, 255, 255, 0.6);
    }
    
    .slot-key {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.7);
    }
    
    .slot-count {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 12px;
      color: white;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }
    
    #debug-info {
      position: fixed;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 12px;
      text-shadow: 1px 1px 2px black;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 5px;
      font-family: 'Consolas', monospace;
    }
    
    #instructions {
      position: fixed;
      top: 10px;
      right: 10px;
      color: white;
      font-size: 12px;
      text-shadow: 1px 1px 2px black;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 5px;
      max-width: 200px;
    }
    
    #instructions h3 {
      margin-bottom: 8px;
      color: #ffcc00;
    }
    
    #instructions p {
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>
  
  <div id="crosshair"></div>
  
  <div id="ui-container">
    <div id="hotbar">
    </div>
  </div>
  
  <div id="debug-info">
    <div id="fps">FPS: --</div>
    <div id="position">位置: (0, 0, 0)</div>
    <div id="chunks">区块: 0</div>
    <div id="biome">生物群系: --</div>
  </div>
  
  <div id="instructions">
    <h3>操作说明</h3>
    <p>WASD - 移动</p>
    <p>鼠标 - 视角</p>
    <p>空格 - 跳跃</p>
    <p>Shift - 潜行</p>
    <p>左键 - 挖掘</p>
    <p>右键 - 放置</p>
    <p>1-9 - 切换快捷栏</p>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
